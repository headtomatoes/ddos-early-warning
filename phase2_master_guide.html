<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 2 Master Guide</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    
    :root {
        --bg-dark: #0f172a;
        --bg-card: #1e293b;
        --bg-code: #0b1120;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --accent-blue: #3b82f6;
        --accent-green: #10b981;
        --accent-purple: #8b5cf6;
        --accent-warning: #f59e0b;
        --accent-danger: #ef4444;
        --border-color: #334155;
    }

    body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; }
    .navbar { position: sticky; top: 0; background-color: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); padding: 1rem 2rem; border-bottom: 1px solid var(--border-color); display: flex; gap: 1rem; z-index: 1000; overflow-x: auto; }
    .nav-btn { background: transparent; color: var(--text-muted); border: 1px solid transparent; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
    .nav-btn:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
    .nav-btn.active { color: var(--accent-blue); background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.2); }
    .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    .section-content { display: none; animation: fadeIn 0.3s ease-in-out; }
    .section-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    h1 { font-size: 2.5rem; background: linear-gradient(to right, var(--accent-blue), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 0; }
    h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; font-size: 1.75rem; display: flex; align-items: center; gap: 0.75rem; margin-top: 2rem; color: var(--text-main); }
    h3 { color: #cbd5e1; margin-top: 1.5rem; }
    p, li { color: var(--text-muted); font-size: 1.05rem; }
    ul, ol { margin-bottom: 1.5rem; } li { margin-bottom: 0.5rem; }

    .callout { padding: 1.25rem; border-radius: 8px; margin: 1.5rem 0; border-left: 4px solid; background-color: rgba(255,255,255,0.03); }
    .callout.info { border-left-color: var(--accent-blue); } .callout.warning { border-left-color: var(--accent-warning); } .callout.danger { border-left-color: var(--accent-danger); } .callout.success { border-left-color: var(--accent-green); }
    .callout-title { font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }

    pre { background-color: var(--bg-code); padding: 1.25rem; border-radius: 8px; border: 1px solid var(--border-color); overflow-x: auto; margin: 1.5rem 0; }
    code { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: #a6e22e; }
    p code, li code { background-color: var(--bg-code); padding: 0.2rem 0.4rem; border-radius: 4px; border: 1px solid var(--border-color); color: var(--accent-blue); }

    .diagram-box { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 2rem; margin-bottom: 3rem; text-align: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .diagram-title { font-weight: 700; font-size: 1.25rem; margin-bottom: 1.5rem; text-align: left; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }

    .task-group { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 1.5rem; padding: 1.5rem; }
    .task-group h2 { margin-top: 0; color: var(--accent-blue); font-size: 1.2rem; border-bottom: none; }
    .task { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px dashed var(--border-color); }
    .task:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    input[type="checkbox"] { width: 20px; height: 20px; margin-top: 2px; accent-color: var(--accent-blue); cursor: pointer; }
    label { cursor: pointer; font-size: 1rem; color: #cbd5e1; }
    .done { text-decoration: line-through; color: #64748b; }
    .progress-bar { height: 8px; background: var(--border-color); border-radius: 4px; overflow: hidden; margin-bottom: 2rem; }
    .progress-fill { height: 100%; background: var(--accent-blue); width: 0%; transition: width 0.3s; }
    
    .note { background: var(--bg-card); border-left: 4px solid var(--accent-purple); padding: 1.5rem; margin-bottom: 1.5rem; border-radius: 4px; }
    .note h2 { margin-top: 0; border-bottom: none; padding-bottom: 0; color: var(--text-main); font-size: 1.5rem; }
</style>
    <script>mermaid.initialize({ startOnLoad: true, theme: 'dark' });</script>
</head>
<body>
    <div class="navbar" id="navbar"></div>
    <div class="container" id="content-container"></div>
    <script>
        const sections = [];

        sections.push({
            title: 'Visualize',
            html: `<h1>Phase 2: Model Architecture</h1>
        <div class="diagram-box"><div class="diagram-title">Embedded Pipeline</div>
        <div class="mermaid">
        graph TD
        A[Raw Array] --> B[FunctionTransformer: log1p]
        B --> C[MinMaxScaler]
        C --> D[XGBClassifier]
        D --> E[ONNX Final Model]
        </div></div>`,
            script: ``
        });
        
        sections.push({
            title: 'Execution Guide',
            html: `<h1>Phase 2 Execution</h1>
        <h2>1. Train Model</h2><pre><code>python ml/w5_train_final.py</code></pre>
        <h2>2. Evaluate Thresholds</h2><pre><code>python ml/w5_threshold.py</code></pre>
        <h2>3. Export ONNX</h2><pre><code>python ml/w6_onnx_export.py</code></pre>`,
            script: ``
        });
        
        sections.push({
            title: 'Structure',
            html: `<h1>ONNX Types</h1><pre><code>initial_types = [('float_input', FloatTensorType([None, 34]))]</code></pre>
        <div class="callout warning"><div class="callout-title">Shape Calculator</div><p>We use <code>skl2onnx.common.shape_calculator.calculate_linear_classifier_output_shapes</code> to bypass the onnxmltools type mismatch bug.</p></div>`,
            script: ``
        });
        
        sections.push({
            title: 'Technical Notes',
            html: `<h1>Technical Notes</h1>
        <div class="note"><h2>tree_method='hist'</h2><p>Without histogram approximation, XGBoost tries to greedily sort 70M rows and triggers an Out-Of-Memory kill.</p></div>
        <div class="note"><h2>Macro-F1 Focus</h2><p>The model distinguishes Attack vs Benign perfectly, but distinguishing specific UDP reflections lowers Macro-F1.</p></div>`,
            script: ``
        });
        
        sections.push({
            title: 'Checklist',
            html: `<h1>Phase 2 Checklist (Completed)</h1><div class="progress-bar"><div class="progress-fill" id="prog"></div></div><div id="checklist"></div>`,
            script: `
    (function() {
        const tasks = [{"group": "1. Training", "items": ["Define FEATURES_V3", "Train XGBoost with tree_method='hist'", "Optimize scale_pos_weight"]}, {"group": "2. Validation", "items": ["Dual-Gate Threshold: FPR <= 0.1%", "Missed Attack <= 1.0%", "Export threshold_analysis.json"]}, {"group": "3. ONNX Export", "items": ["Bind FunctionTransformer(log1p)", "Bind MinMaxScaler", "Register XGBClassifier in skl2onnx", "Export xgboost_final.onnx"]}];
        const storageKey = 'p2-check';
        let saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
        
        // Auto-check if pre_check is true and no save exists
        if (true && Object.keys(saved).length === 0) {
            tasks.forEach((g, gIdx) => {
                g.items.forEach((_, iIdx) => {
                    saved[\`t-\${gIdx}-\${iIdx}\`] = true;
                });
            });
            localStorage.setItem(storageKey, JSON.stringify(saved));
        }

        const chkContainer = document.getElementById('checklist');
        if (!chkContainer) return;
        chkContainer.innerHTML = ''; 

        function updateProg() {
            const boxes = document.querySelectorAll('#checklist input[type="checkbox"]');
            const checked = document.querySelectorAll('#checklist input[type="checkbox"]:checked');
            const prog = document.getElementById('prog');
            if (prog && boxes.length > 0) {
                prog.style.width = \`\${(checked.length / boxes.length) * 100}%\`;
            }
        }

        tasks.forEach((g, gIdx) => {
            const div = document.createElement('div');
            div.className = 'task-group';
            div.innerHTML = \`<h2>\${g.group}</h2>\`;
            g.items.forEach((item, iIdx) => {
                const id = \`t-\${gIdx}-\${iIdx}\`;
                const tDiv = document.createElement('div');
                tDiv.className = 'task';
                const isChecked = saved[id] ? 'checked' : '';
                const isDone = saved[id] ? 'done' : '';
                tDiv.innerHTML = \`<input type="checkbox" id="\${id}" \${isChecked}><label for="\${id}" class="\${isDone}">\${item}</label>\`;
                div.appendChild(tDiv);
            });
            chkContainer.appendChild(div);
        });

        if (!window[\`\${storageKey}Bound\`]) {
            window[\`\${storageKey}Bound\`] = true;
            document.addEventListener('change', (e) => {
                if(e.target.tagName === 'INPUT' && e.target.id.startsWith('t-')) {
                    const s = JSON.parse(localStorage.getItem(storageKey) || '{}');
                    s[e.target.id] = e.target.checked;
                    localStorage.setItem(storageKey, JSON.stringify(s));
                    e.target.nextElementSibling.classList.toggle('done', e.target.checked);
                    updateProg();
                }
            });
        }
        updateProg();
    })();
    `
        });
        
        const navbar = document.getElementById('navbar');
        const container = document.getElementById('content-container');

        function loadSection(index) {
            document.querySelectorAll('.nav-btn').forEach((btn, i) => {
                btn.className = i === index ? 'nav-btn active' : 'nav-btn';
            });
            container.innerHTML = `<div class="section-content active">${sections[index].html}</div>`;
            if(sections[index].script) {
                try { eval(sections[index].script); } catch(e) { console.error('Script error:', e); }
            }
            if(sections[index].html.includes('mermaid')) {
                mermaid.init(undefined, document.querySelectorAll('.mermaid'));
            }
        }

        sections.forEach((sec, i) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.textContent = sec.title;
            btn.onclick = () => loadSection(i);
            navbar.appendChild(btn);
        });

        if(sections.length > 0) loadSection(0);
    </script>
</body>
</html>
