<div class="container">
<h1>Phase 3: XDP &amp; Controller Implementation Guide</h1>
<p>This guide provides a comprehensive, step-by-step roadmap for migrating the Machine Learning pipeline built on your Windows environment to the real-time Linux XDP environment.</p>
<div class="callout warning">
<div class="callout-title">⚠️ Cross-Platform Architecture Context</div>
<p style="margin:0;">The ML model was trained on <strong>Windows</strong>, but eBPF/XDP requires a <strong>Linux</strong> kernel (preferably v5.15+). Your system architecture is split: Windows acts as the AI Training Lab, while Linux acts as the Production Firewall.</p>
</div>
<div class="architecture-grid">
<div class="arch-box">
<div class="arch-title">🪟 Windows (Training Environment)</div>
<ul>
<li>Parses raw PCAP/CSV datasets</li>
<li>Trains XGBoost &amp; outputs ONNX</li>
<li>Generates <code>xgboost_final.onnx</code></li>
<li>Generates <code>deploy_config.json</code></li>
</ul>
</div>
<div class="arch-box">
<div class="arch-title">🐧 Linux (Deployment Environment)</div>
<ul>
<li>Runs the compiled <code>xdp_prog.o</code> in Kernel Space</li>
<li>Runs the Go Controller in User Space</li>
<li>Loads the ONNX model via ONNX Runtime</li>
<li>Executes real-time packet dropping</li>
</ul>
</div>
</div>
<!-- STEP 1 -->
<h2><span class="step-badge">1</span> Transfer &amp; Setup the Linux Environment</h2>
<p>Before writing code, we must prepare the Linux VM to accept the Windows artifacts and compile eBPF code.</p>
<h3>1.1 Install Prerequisites on Linux</h3>
<p>Open your Linux terminal and install the eBPF/Clang toolchain and Go:</p>
<pre><code>sudo apt update
sudo apt install -y clang llvm libbpf-dev linux-headers-$(uname -r) bpfcc-tools bpftool
sudo apt install -y golang-go</code></pre>
<h3>1.2 Transfer ML Artifacts</h3>
<p>Copy the output files from your Windows <code>/ml</code> folder to the Linux <code>/controller</code> folder using SCP, SFTP, or a shared folder. You strictly need:</p>
<ul>
<li><code>xgboost_final.onnx</code></li>
<li><code>deploy_config.json</code></li>
</ul>
<!-- STEP 2 -->
<h2><span class="step-badge">2</span> Write the XDP C Program (Kernel Space)</h2>
<p>The XDP program must parse packets at the network card level, accumulate statistics into a struct, and check a blacklist.</p>
<div class="callout info">
<div class="callout-title">🧠 Design Philosophy: Keep eBPF Dumb, Keep Go Smart</div>
<p style="margin:0;">eBPF is highly restricted. Do <strong>not</strong> attempt floating-point math, divisions, or per-second rate calculations in C. The C code should only accumulate raw integers (Bytes, Packets, Nanoseconds). The Go Controller will do the complex math to match the 34 features expected by ONNX.</p>
</div>
<h3>2.1 Define the eBPF Maps</h3>
<p>Create a file named <code>xdp/xdp_prog.c</code>. We need two maps: one for tracking flows, and one for blacklisting IPs.</p>
<pre><code>#include &lt;linux/bpf.h&gt;
#include &lt;bpf/bpf_helpers.h&gt;
#include &lt;linux/if_ether.h&gt;
#include &lt;linux/ip.h&gt;
#include &lt;linux/tcp.h&gt;

// The raw counters we accumulate for every IP
struct flow_stats {
    __u64 first_seen_ns;
    __u64 last_seen_ns;
    __u64 fwd_packet_count;
    __u64 bwd_packet_count;
    __u64 fwd_byte_count;
    __u64 bwd_byte_count;
    __u64 syn_flags;
    __u64 ack_flags;
    // ... add fields for RST, PSH, URG, and IAT accumulators
};

// Map 1: Track statistics per Source IP
struct {
    __uint(type, BPF_MAP_TYPE_LRU_HASH);
    __uint(max_entries, 65536);
    __type(key, __u32); // Source IP
    __type(value, struct flow_stats);
} flow_map SEC(".maps");

// Map 2: The Blacklist populated by the Go Controller
struct {
    __uint(type, BPF_MAP_TYPE_HASH);
    __uint(max_entries, 10000);
    __type(key, __u32); // Source IP
    __type(value, __u8); // Boolean drop flag
} drop_map SEC(".maps");</code></pre>
<h3>2.2 The XDP Packet Logic</h3>
<p>Next, write the main XDP hook that processes every incoming packet.</p>
<pre><code>SEC("xdp")
int ddos_early_warning(struct xdp_md *ctx) {
    void *data_end = (void *)(long)ctx-&gt;data_end;
    void *data = (void *)(long)ctx-&gt;data;

    // 1. Parse Ethernet &amp; IP
    struct ethhdr *eth = data;
    if (data + sizeof(*eth) &gt; data_end) return XDP_PASS;
    if (eth-&gt;h_proto != __constant_htons(ETH_P_IP)) return XDP_PASS;

    struct iphdr *ip = data + sizeof(*eth);
    if ((void*)(ip + 1) &gt; data_end) return XDP_PASS;

    __u32 src_ip = ip-&gt;saddr;

    // 2. Fast-Path Drop Check
    __u8 *drop_flag = bpf_map_lookup_elem(&amp;drop_map, &amp;src_ip);
    if (drop_flag &amp;&amp; *drop_flag == 1) {
        return XDP_DROP; // Mitigation executed at line-rate!
    }

    // 3. Update Flow Statistics
    struct flow_stats *stats = bpf_map_lookup_elem(&amp;flow_map, &amp;src_ip);
    if (stats) {
        __u64 now = bpf_ktime_get_ns();
        stats-&gt;fwd_packet_count++;
        stats-&gt;fwd_byte_count += bpf_ntohs(ip-&gt;tot_len);
        stats-&gt;last_seen_ns = now;
        // ... update TCP flags if protocol == TCP
    } else {
        struct flow_stats new_stats = {0};
        new_stats.first_seen_ns = bpf_ktime_get_ns();
        new_stats.fwd_packet_count = 1;
        new_stats.fwd_byte_count = bpf_ntohs(ip-&gt;tot_len);
        bpf_map_update_elem(&amp;flow_map, &amp;src_ip, &amp;new_stats, BPF_ANY);
    }

    return XDP_PASS;
}

char _license[] SEC("license") = "GPL";</code></pre>
<p><strong>To Compile:</strong> Run this command in your Linux terminal to generate the eBPF object file:</p>
<pre><code>clang -O2 -g -target bpf -c xdp_prog.c -o xdp_prog.o</code></pre>
<!-- STEP 3 -->
<h2><span class="step-badge">3</span> Write the Go Controller (User Space)</h2>
<p>The Go application acts as the brain. It reads the raw maps, calculates the rates (e.g., Packets/s), feeds the data to ONNX, and issues Drop commands.</p>
<h3>3.1 Setup Go Project</h3>
<p>Initialize the Go module and install dependencies (Cilium eBPF and ONNX Runtime Go bindings):</p>
<pre><code>cd controller
go mod init ddos-controller
go get github.com/cilium/ebpf
go get github.com/yalue/onnxruntime_go</code></pre>
<h3>3.2 The Controller Logic Loop</h3>
<p>Create <code>main.go</code>. The logic should follow this pseudocode structure:</p>
<div class="callout success">
<div class="callout-title">💡 Crucial Note on the ONNX Model</div>
<p style="margin:0;">Remember that in Windows, we successfully baked the <code>log1p</code> and <code>MinMaxScaler</code> directly into the ONNX file. Therefore, Go <strong>only</strong> needs to compute the raw real-world values (like Flow Bytes/s). Do not try to log-transform or scale values in Go!</p>
</div>
<pre><code>package main

import (
    "fmt"
    "time"
    "github.com/cilium/ebpf"
    "github.com/yalue/onnxruntime_go"
)

func main() {
    // 1. Initialize ONNX Runtime &amp; Load Model
    onnxruntime_go.SetSharedLibraryPath("/usr/lib/libonnxruntime.so")
    err := onnxruntime_go.InitializeEnvironment()
    // ... load "xgboost_final.onnx"

    // 2. Load eBPF Maps compiled from xdp_prog.o
    objs := struct {
        FlowMap *ebpf.Map \`ebpf:"flow_map"\`
        DropMap *ebpf.Map \`ebpf:"drop_map"\`
    }{}
    // ... loadObjs()

    // 3. Polling Loop
    ticker := time.NewTicker(200 * time.Millisecond)
    for range ticker.C {
        var ip uint32
        var stats FlowStats
        iterator := objs.FlowMap.Iterate()

        // Iterate over all active flows
        for iterator.Next(&amp;ip, &amp;stats) {
            
            // Calculate Pre-Processing Features
            durationSec := float32(stats.LastSeenNs - stats.FirstSeenNs) / 1e9
            if durationSec == 0 { durationSec = 0.001 } // Prevent Div by 0
            
            flowBytesPerSec := float32(stats.FwdByteCount) / durationSec
            flowPktsPerSec := float32(stats.FwdPacketCount) / durationSec
            
            // Construct the exactly 34-feature array matching FEATURES_V3
            features := []float32{
                flowBytesPerSec,
                float32(stats.FwdByteCount),
                flowPktsPerSec,
                // ... map all 34 features
            }

            // Run ONNX Inference
            attackScore := runInference(features)

            // Threshold Enforcement
            if attackScore &gt; 0.5 {
                fmt.Printf("🚨 DDoS Detected from IP %d! Score: %.2f\\n", ip, attackScore)
                dropVal := uint8(1)
                objs.DropMap.Update(ip, dropVal, ebpf.UpdateAny)
            }
        }
    }
}</code></pre>

<h1>Technical Notes &amp; Decisions</h1>
<div class="note">
<h2>1. Why BPF_MAP_TYPE_LRU_HASH?</h2>
<p><strong>Concept:</strong> LRU (Least Recently Used) Hash Maps automatically evict the oldest entries when the map reaches its capacity limit.</p>
<p><strong>Decision:</strong> DDoS attacks involve massive IP spoofing (millions of fake IPs). A standard Hash map would fill up instantly and drop new flows, bypassing the detector. An LRU map naturally purges stale IPs to track the active flood.</p>
</div>
<div class="note">
<h2>2. Why No Floating Point in eBPF?</h2>
<p><strong>Concept:</strong> The eBPF kernel verifier forbids floating point operations for safety and performance reasons. It only understands integers.</p>
<p><strong>Decision:</strong> We track total nanoseconds, total bytes, and packet counts as <code>uint64</code> in the Kernel. The Go Controller, running in userspace, converts these into floats and calculates rate-per-second to feed the Machine Learning model.</p>
</div>
<div class="note">
<h2>3. Why embedded log1p in ONNX?</h2>
<p><strong>Concept:</strong> ML Models are sensitive to feature scales. If the data is skewed, tree structures behave poorly.</p>
<p><strong>Decision:</strong> By utilizing <code>FunctionTransformer</code> during Phase 2 ONNX Export, the logarithmic transformation is natively handled by the C++ ONNX Runtime. The Go code is kept purely for networking logistics, drastically reducing bugs.</p>
</div>
<div class="note">
<h2>4. The Endianness Trap</h2>
<p><strong>Concept:</strong> Network bytes arrive in Big-Endian, but most modern CPUs (x86, ARM) are Little-Endian.</p>
<p><strong>Decision:</strong> When reading packet lengths in eBPF, you MUST use <code>bpf_ntohs(ip-&gt;tot_len)</code> (Network-To-Host-Short) before adding it to your byte counters. Otherwise, 100 bytes will be interpreted as 25600 bytes, corrupting ML inference.</p>
</div>
